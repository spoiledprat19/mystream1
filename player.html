<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILL DILL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #e50914; --dark: #0a0a0a; --card-bg: #1f1f1f; --muted: #b3b3b3; --radius: 6px; }
    body { background: var(--dark); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4%; height: 64px; background: #000;
      border-bottom: 1px solid #1a1a1a;
    }
    .logo { font-size: 22px; font-weight: 700; color: var(--red); letter-spacing: 3px; }
    .logo a { color: var(--red); display: flex; align-items: center; gap: 10px; }
    .back { font-size: 20px; color: #fff; }

    .player-wrapper { max-width: 1060px; margin: 28px auto; padding: 0 4%; }

    .player-container {
      width: 100%; aspect-ratio: 16/9;
      background: #000; border-radius: 8px;
      overflow: hidden; margin-bottom: 22px;
      border: 1px solid #1f1f1f;
    }
    .player-container iframe { width: 100%; height: 100%; border: none; display: block; }

    .player-info { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
    .player-poster { width: 120px; flex-shrink: 0; }
    .player-poster img { width: 100%; display: block; border-radius: 6px; }
    .player-details { flex: 1; min-width: 200px; }
    .player-details h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .meta span { background: rgba(255,255,255,0.08); padding: 4px 12px; border-radius: 4px; font-size: 12px; color: var(--muted); }
    .player-details p { font-size: 14px; color: #ccc; line-height: 1.7; margin-bottom: 16px; }

    .btn-drive {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--red); color: #fff;
      padding: 10px 22px; border-radius: var(--radius);
      font-size: 14px; font-weight: 600; transition: background 0.2s;
    }
    .btn-drive:hover { background: #c40812; }

    .related-section { max-width: 1060px; margin: 48px auto 20px; padding: 0 4%; }
    .row-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #e5e5e5; }
    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .movie-card { background: var(--card-bg); border-radius: 4px; overflow: hidden; transition: transform 0.2s; display: block; }
    .movie-card:hover { transform: scale(1.05); }
    .card-thumb { position: relative; aspect-ratio: 2/3; overflow: hidden; background: #2a2a2a; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .movie-card:hover .card-overlay { opacity: 1; }
    .play-circle { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; }
    .play-circle span { font-size: 18px; color: #000; margin-left: 3px; }
    .card-info { padding: 10px 12px 14px; }
    .card-info h3 { font-size: 13px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-info p { font-size: 11px; color: var(--muted); }

    footer { text-align: center; padding: 32px; font-size: 13px; color: #555; border-top: 1px solid #1a1a1a; margin-top: 40px; }

    @media (max-width: 600px) {
      .player-poster { display: none; }
      .player-details h1 { font-size: 20px; }
      .movie-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <a href="index.html"><span class="back">&#8592;</span> KILL DILL</a>
    </div>
  </nav>

  <div class="player-wrapper">
    <div class="player-container">
      <iframe id="video-frame" src="" allow="autoplay; fullscreen" allowfullscreen frameborder="0"></iframe>
    </div>
    <div class="player-info">
      <div class="player-poster">
        <img id="player-poster" src="" alt="Movie Poster">
      </div>
      <div class="player-details">
        <h1 id="player-title">Loading...</h1>
        <div class="meta">
          <span id="player-year"></span>
          <span id="player-genre"></span>
          <span id="player-duration"></span>
        </div>
        <p id="player-desc"></p>
        <a id="drive-link" href="#" target="_blank" class="btn-drive">
          &#9654; Open directly in Google Drive
        </a>
      </div>
    </div>
  </div>

  <div class="related-section">
    <h2 class="row-title">More Movies</h2>
    <div class="movie-grid" id="related-grid"></div>
  </div>

  <footer>
    <p>KILL DILL &copy; 2025 &nbsp;&mdash;&nbsp; Private use only</p>
  </footer>

  <script>
    const MOVIES = [
      {
        id: 0,
        title: "About Time",
        description: "Like all the men in his family, Tim Lake possesses the power to travel in time. With the advice of his father, he uses his special ability to pursue his romantic interest, Mary.",
        year: 2013,
        genre: "Romance · Comedy · Drama",
        duration: "2h 3m",
        driveId: "1vJDfAg-yQZXQWEO--TbWBsTzfGFBK1bL",
        thumbnail: "https://m.media-amazon.com/images/M/MV5BMTMwODcyOTQyMF5BMl5BanBnXkFtZTcwNDM4NDY3OQ@@._V1_FMjpg_UX1000_.jpg"
      },
      {
        id: 1,
        title: "Before Sunrise",
        description: "A young man and woman meet on a train in Europe and agree to spend one evening together in Vienna. Their night together changes both of their lives forever.",
        year: 1995,
        genre: "Romance · Drama",
        duration: "1h 41m",
        driveId: "1XZbMisNWlZSYYRXriq96dt2U1RJjTUrW",
        thumbnail: "https://m.media-amazon.com/images/M/MV5BMTIwMDgwNTQ0Ml5BMl5BanBnXkFtZTcwNTAwNDc4NA@@._V1_FMjpg_UX1000_.jpg"
      },
      {
        id: 2,
        title: "Before Sunset",
        description: "Nine years after their first meeting, Jesse and Celine reunite in Paris. As they walk through the city, they reconnect and realize their feelings never truly faded.",
        year: 2004,
        genre: "Romance · Drama",
        duration: "1h 20m",
        driveId: "15dy1SLC3eK8WtiGEHLsy5XTtR1SaEnuF",
        thumbnail: "https://m.media-amazon.com/images/M/MV5BNTk3MDc4NTU4MF5BMl5BanBnXkFtZTYwMjI3NjU3._V1_FMjpg_UX1000_.jpg"
      },
      {
        id: 3,
        title: "Before Midnight",
        description: "Jesse and Celine are now living together in Europe with their twin daughters. On holiday in Greece, they face the harsh realities of life and love in a long-term relationship.",
        year: 2013,
        genre: "Romance · Drama",
        duration: "1h 49m",
        driveId: "1NEoNmCro8dX9Zz-U2eJY3Pk00brmneV1",
        thumbnail: "https://m.media-amazon.com/images/M/MV5BMTc3NTY3MTMwNl5BMl5BanBnXkFtZTcwMjM4NjcxOQ@@._V1_FMjpg_UX1000_.jpg"
      },
      {
        id: 4,
        title: "13 Going on 30",
        description: "After a humiliating party, a 13-year-old girl wakes up as a 30-year-old woman and must navigate adult life while rediscovering what truly matters.",
        year: 2004,
        genre: "Romance · Comedy",
        duration: "1h 37m",
        driveId: "1OlnSwFUYNM2EwtJFDo3FWlm4BkmMY8uU",
        thumbnail: "https://m.media-amazon.com/images/M/MV5BMTI2NjMzMzIwNV5BMl5BanBnXkFtZTYwNTY0OTU3._V1_FMjpg_UX1000_.jpg"
      }
    ];

    const id = parseInt(new URLSearchParams(window.location.search).get('id')) || 0;
    const movie = MOVIES.find(m => m.id === id) || MOVIES[0];

    document.title = movie.title + ' — KILL DILL';
    document.getElementById('player-title').textContent = movie.title;
    document.getElementById('player-desc').textContent = movie.description;
    document.getElementById('player-year').textContent = movie.year;
    document.getElementById('player-genre').textContent = movie.genre;
    document.getElementById('player-duration').textContent = movie.duration;
    document.getElementById('player-poster').src = movie.thumbnail;
    document.getElementById('player-poster').alt = movie.title;
    document.getElementById('video-frame').src = `https://drive.google.com/file/d/${movie.driveId}/preview`;
    document.getElementById('drive-link').href = `https://drive.google.com/file/d/${movie.driveId}/view?usp=sharing`;

    document.getElementById('related-grid').innerHTML = MOVIES
      .filter(m => m.id !== id)
      .map(m => `
        <a class="movie-card" href="player.html?id=${m.id}">
          <div class="card-thumb">
            <img src="${m.thumbnail}" alt="${m.title}" loading="lazy">
            <div class="card-overlay"><div class="play-circle"><span>&#9654;</span></div></div>
          </div>
          <div class="card-info">
            <h3>${m.title}</h3>
            <p>${m.year} &bull; ${m.genre}</p>
          </div>
        </a>`).join('');
  </script>

</body>
</html>
