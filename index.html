<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILL DILL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #e50914; --dark: #141414; --card-bg: #1f1f1f; --muted: #b3b3b3; --radius: 6px; }
    body { background: var(--dark); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    .navbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4%; height: 64px; background: #000;
    }
    .logo { font-size: 26px; font-weight: 700; color: var(--red); letter-spacing: 3px; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: var(--muted); font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    .hero {
      position: relative; height: 580px;
      background: #1a1a1a center/cover no-repeat;
      display: flex; align-items: flex-end;
      padding: 0 5% 70px;
    }
    .hero-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to top, #141414 0%, transparent 55%);
      pointer-events: none;
    }
    .hero-content { position: relative; z-index: 2; max-width: 520px; }
    .hero-badge {
      display: inline-block; background: var(--red);
      color: #fff; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 3px; margin-bottom: 14px;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .hero-content h1 { font-size: 50px; font-weight: 700; margin-bottom: 14px; line-height: 1.05; }
    .hero-meta { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .hero-meta span { font-size: 13px; color: var(--muted); }
    .hero-content p { font-size: 15px; color: #ccc; margin-bottom: 22px; line-height: 1.6; }
    .hero-buttons { display: flex; gap: 12px; flex-wrap: wrap; }

    .btn-play {
      background: #fff; color: #000; border: none;
      padding: 12px 32px; border-radius: var(--radius);
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: background 0.2s; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-play:hover { background: rgba(255,255,255,0.85); }
    .btn-info {
      background: rgba(109,109,110,0.7); color: #fff;
      border: none; padding: 12px 28px; border-radius: var(--radius);
      font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-info:hover { background: rgba(109,109,110,0.5); }

    .content { padding: 0 4% 40px; }
    .row { margin-bottom: 40px; }
    .row-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #e5e5e5; }

    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }

    .movie-card {
      background: var(--card-bg); border-radius: 4px;
      overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer; display: block; position: relative;
    }
    .movie-card:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(0,0,0,0.8); z-index: 2; }
    .card-thumb { position: relative; aspect-ratio: 2/3; overflow: hidden; background: #2a2a2a; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .movie-card:hover .card-thumb img { transform: scale(1.06); }
    .card-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .movie-card:hover .card-overlay { opacity: 1; }
    .play-circle {
      width: 54px; height: 54px; border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex; align-items: center; justify-content: center;
    }
    .play-circle span { font-size: 22px; color: #000; margin-left: 4px; }
    .card-info { padding: 10px 12px 14px; }
    .card-info h3 { font-size: 13px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-info p { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    footer { text-align: center; padding: 32px; font-size: 13px; color: #555; border-top: 1px solid #222; margin-top: 20px; }

    @media (max-width: 600px) {
      .hero { height: 420px; padding-bottom: 50px; }
      .hero-content h1 { font-size: 32px; }
      .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .btn-play, .btn-info { padding: 10px 20px; font-size: 14px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">KILL DILL</div>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="#">Movies</a>
    </div>
  </nav>

  <section class="hero" id="hero"></section>

  <main class="content">
    <section class="row">
      <h2 class="row-title">All Movies</h2>
      <div class="movie-grid" id="movie-grid"></div>
    </section>
  </main>

  <footer>
    <p>KILL DILL &copy; 2025 &nbsp;&mdash;&nbsp; Private use only</p>
  </footer>

  <script>
    const MOVIES = [
      {
        id: 0,
        title: "About Time",
        description: "Like all the men in his family, Tim Lake possesses the power to travel in time. With the advice of his father, he uses his special ability to pursue his romantic interest, Mary.",
        year: 2013,
        genre: "Romance · Comedy · Drama",
        duration: "2h 3m",
        driveId: "1vJDfAg-yQZXQWEO--TbWBsTzfGFBK1bL",
        thumbnail: "https://upload.wikimedia.org/wikipedia/en/thumb/b/b4/About_Time_2013.png/220px-About_Time_2013.png"
      },
      {
        id: 1,
        title: "Before Sunrise",
        description: "A young man and woman meet on a train in Europe and agree to spend one evening together in Vienna. Their night together changes both of their lives forever.",
        year: 1995,
        genre: "Romance · Drama",
        duration: "1h 41m",
        driveId: "1XZbMisNWlZSYYRXriq96dt2U1RJjTUrW",
        thumbnail: "https://upload.wikimedia.org/wikipedia/en/thumb/9/9c/Before_Sunrise_poster.jpg/220px-Before_Sunrise_poster.jpg"
      },
      {
        id: 2,
        title: "Before Sunset",
        description: "Nine years after their first meeting, Jesse and Celine reunite in Paris. As they walk through the city, they reconnect and realize their feelings never truly faded.",
        year: 2004,
        genre: "Romance · Drama",
        duration: "1h 20m",
        driveId: "15dy1SLC3eK8WtiGEHLsy5XTtR1SaEnuF",
        thumbnail: "https://upload.wikimedia.org/wikipedia/en/thumb/e/e9/Before_Sunset_poster.jpg/220px-Before_Sunset_poster.jpg"
      },
      {
        id: 3,
        title: "Before Midnight",
        description: "Jesse and Celine are now living together in Europe with their twin daughters. On holiday in Greece, they face the harsh realities of life and love in a long-term relationship.",
        year: 2013,
        genre: "Romance · Drama",
        duration: "1h 49m",
        driveId: "1NEoNmCro8dX9Zz-U2eJY3Pk00brmneV1",
        thumbnail: "https://upload.wikimedia.org/wikipedia/en/thumb/8/8f/Before_Midnight_2013_film_poster.jpg/220px-Before_Midnight_2013_film_poster.jpg"
      },
      {
        id: 4,
        title: "13 Going on 30",
        description: "After a humiliating party, a 13-year-old girl wakes up as a 30-year-old woman and must navigate adult life while rediscovering what truly matters.",
        year: 2004,
        genre: "Romance · Comedy",
        duration: "1h 37m",
        driveId: "1OlnSwFUYNM2EwtJFDo3FWlm4BkmMY8uU",
        thumbnail: "https://upload.wikimedia.org/wikipedia/en/thumb/1/13/13_Going_on_30_film_poster.jpg/220px-13_Going_on_30_film_poster.jpg"
      }
    ];

    function buildCard(m) {
      return `
        <a class="movie-card" href="player.html?id=${m.id}">
          <div class="card-thumb">
            <img src="${m.thumbnail}" alt="${m.title}" loading="lazy">
            <div class="card-overlay">
              <div class="play-circle"><span>&#9654;</span></div>
            </div>
          </div>
          <div class="card-info">
            <h3>${m.title}</h3>
            <p>${m.year} &bull; ${m.genre}</p>
          </div>
        </a>`;
    }

    const hero = MOVIES[0];
    document.getElementById('hero').innerHTML = `
      <div style="position:relative;z-index:2;max-width:520px;">
        <div style="display:inline-block;background:#e50914;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;margin-bottom:14px;letter-spacing:1px;">FEATURED</div>
        <h1 style="font-size:50px;font-weight:700;margin-bottom:14px;line-height:1.05;">${hero.title}</h1>
        <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;">
          <span style="font-size:13px;color:#b3b3b3;">${hero.year}</span>
          <span style="font-size:13px;color:#b3b3b3;">&#9679;</span>
          <span style="font-size:13px;color:#b3b3b3;">${hero.genre}</span>
          <span style="font-size:13px;color:#b3b3b3;">&#9679;</span>
          <span style="font-size:13px;color:#b3b3b3;">${hero.duration}</span>
        </div>
        <p style="font-size:15px;color:#ccc;margin-bottom:22px;line-height:1.6;">${hero.description}</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <a href="player.html?id=${hero.id}" style="background:#fff;color:#000;padding:12px 32px;border-radius:6px;font-size:16px;font-weight:700;display:inline-flex;align-items:center;gap:8px;">&#9654; Play</a>
          <button style="background:rgba(109,109,110,0.7);color:#fff;border:none;padding:12px 28px;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;">More Info</button>
        </div>
      </div>
      <div style="position:absolute;inset:0;background:linear-gradient(to top,#141414 0%,transparent 55%);pointer-events:none;"></div>`;

    document.getElementById('hero').style.background =
      `linear-gradient(to right, #000 30%, rgba(0,0,0,0.3) 100%), url('${hero.thumbnail}') center/cover no-repeat`;

    document.getElementById('movie-grid').innerHTML = MOVIES.map(buildCard).join('');
  </script>

</body>
</html>
