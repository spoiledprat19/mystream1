<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILL DILL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #e50914; --dark: #141414; --card-bg: #1f1f1f; --muted: #b3b3b3; --radius: 6px; }
    body { background: var(--dark); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    .navbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4%; height: 64px; background: #000;
    }
    .logo { font-size: 26px; font-weight: 700; color: var(--red); letter-spacing: 3px; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: var(--muted); font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-admin { background: #1a1a1a; color: #555 !important; border: 1px solid #2a2a2a; padding: 5px 12px; border-radius: 4px; font-size: 12px !important; }
    .nav-admin:hover { color: #ccc !important; }

    .hero {
      position: relative; height: 580px;
      background: #1a1a1a center/cover no-repeat;
      display: flex; align-items: flex-end;
      padding: 0 5% 70px;
    }
    .hero-fade { position: absolute; inset: 0; background: linear-gradient(to top, #141414 0%, transparent 55%); pointer-events: none; }
    .hero-content { position: relative; z-index: 2; max-width: 520px; }
    .hero-badge { display: inline-block; background: var(--red); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 3px; margin-bottom: 14px; letter-spacing: 1px; text-transform: uppercase; }
    .hero-content h1 { font-size: 50px; font-weight: 700; margin-bottom: 14px; line-height: 1.05; }
    .hero-meta { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .hero-meta span { font-size: 13px; color: var(--muted); }
    .hero-content p { font-size: 15px; color: #ccc; margin-bottom: 22px; line-height: 1.6; }
    .hero-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-play { background: #fff; color: #000; border: none; padding: 12px 32px; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-play:hover { background: rgba(255,255,255,0.85); }
    .btn-info { background: rgba(109,109,110,0.7); color: #fff; border: none; padding: 12px 28px; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; }

    .content { padding: 0 4% 40px; }
    .row { margin-bottom: 40px; }
    .row-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #e5e5e5; }

    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .movie-card { background: var(--card-bg); border-radius: 4px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; display: block; }
    .movie-card:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(0,0,0,0.8); z-index: 2; position: relative; }
    .card-thumb { position: relative; aspect-ratio: 2/3; overflow: hidden; background: #2a2a2a; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .movie-card:hover .card-thumb img { transform: scale(1.06); }
    .card-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .movie-card:hover .card-overlay { opacity: 1; }
    .play-circle { width: 54px; height: 54px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; }
    .play-circle span { font-size: 22px; color: #000; margin-left: 4px; }
    .card-info { padding: 10px 12px 14px; }
    .card-info h3 { font-size: 13px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-info p { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .loading-state { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; padding: 32px; font-size: 13px; color: #555; border-top: 1px solid #222; margin-top: 20px; }

    @media (max-width: 600px) {
      .hero { height: 420px; padding-bottom: 50px; }
      .hero-content h1 { font-size: 32px; }
      .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">KILL DILL</div>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="admin.html" class="nav-admin">⚙ Admin</a>
    </div>
  </nav>

  <section class="hero" id="hero">
    <div class="hero-content" id="hero-content">
      <div style="text-align:center;padding:80px 0;">
        <div class="spinner"></div><br>Loading...
      </div>
    </div>
    <div class="hero-fade"></div>
  </section>

  <main class="content">
    <section class="row">
      <h2 class="row-title">All Movies</h2>
      <div id="movie-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          <div>Loading movies...</div>
        </div>
      </div>
    </section>
  </main>

  <footer><p>KILL DILL &copy; 2025 &nbsp;&mdash;&nbsp; Private use only</p></footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    firebase.initializeApp({ databaseURL: "https://killdill-6ce9f-default-rtdb.asia-southeast1.firebasedatabase.app/" });
    const db = firebase.database();

    function buildCard(m) {
      return `
        <a class="movie-card" href="player.html?id=${m.id}">
          <div class="card-thumb">
            <img src="${m.thumbnail || ''}" alt="${m.title}" loading="lazy" onerror="this.style.display='none'">
            <div class="card-overlay"><div class="play-circle"><span>&#9654;</span></div></div>
          </div>
          <div class="card-info">
            <h3>${m.title}</h3>
            <p>${m.year} &bull; ${m.genre}</p>
          </div>
        </a>`;
    }

    // Listen to Firebase — updates in real time whenever admin saves
    db.ref('movies').on('value', snap => {
      const data = snap.val();
      if (!data) { document.getElementById('movie-grid').innerHTML = '<div class="loading-state">No movies yet. Go to Admin to add movies.</div>'; return; }

      const movies = Array.isArray(data) ? data : Object.values(data);

      // Hero — first movie
      const hero = movies[0];
      if (hero) {
        document.getElementById('hero').style.background =
          `linear-gradient(to right, #000 30%, rgba(0,0,0,0.3) 100%), url('${hero.thumbnail}') center/cover no-repeat`;
        document.getElementById('hero-content').innerHTML = `
          <div class="hero-badge">Featured</div>
          <h1>${hero.title}</h1>
          <div class="hero-meta">
            <span>${hero.year}</span><span>&#9679;</span>
            <span>${hero.genre}</span><span>&#9679;</span>
            <span>${hero.duration}</span>
          </div>
          <p>${hero.description}</p>
          <div class="hero-buttons">
            <a href="player.html?id=${hero.id}" class="btn-play">&#9654; Play</a>
            <button class="btn-info">More Info</button>
          </div>`;
      }

      // Grid
      document.getElementById('movie-grid').innerHTML = `<div class="movie-grid">${movies.map(buildCard).join('')}</div>`;
    });
  </script>

</body>
</html>
